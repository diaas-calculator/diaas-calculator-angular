<!-- TODO some hover animation + nicer feedback to user when switching lang + add english flag-->
<div class="lang">
    <img class="flag" [ngStyle]="lang==='en'? this.getSelectedStyle() : this.getNotSelectedStyle()" src="assets/img/english_flag.svg" alt="English language" title="English language" width="30rem" height="24rem" (click)="this.setLang('en')">
    <img class="flag" [ngStyle]="lang==='fr'? this.getSelectedStyle() : this.getNotSelectedStyle()" src="assets/img/french_flag.jpg" alt="Traduction des noms de nourriture en français" title="Traduction des noms de nourriture en français" width="36rem" height="24rem" (click)="this.setLang('fr')">
    <img class="flag" [ngStyle]="lang==='de'? this.getSelectedStyle() : this.getNotSelectedStyle()" src="assets/img/german_flag.png" alt="Übersetzung von Lebensmittelnamen ins Französische" title="Übersetzung von Lebensmittelnamen ins Französische" width="30rem" height="24rem" (click)="this.setLang('de')"><br/>
</div>
